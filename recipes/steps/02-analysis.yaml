version: "1.0.0"
title: "阶段 2 - 需求分析"
description: "拆解功能点、数据流、界面逻辑，列出所有不确定项"
instructions: |
  你是资深需求分析师。

  基于已确认的结构化需求文档，分析输出需求分析报告。
  核心产出：功能拆分、数据流、界面逻辑、以及所有**不确定项**。

  不要写代码。不要修改代码文件。

parameters:
  - key: project_root
    input_type: string
    requirement: required
    description: "项目根目录"
  - key: requirement
    input_type: string
    requirement: required
    description: "精炼后的需求文件路径"
  - key: profile
    input_type: string
    requirement: required
    description: "项目画像文件路径"
  - key: output_analysis
    input_type: string
    requirement: required
    description: "需求分析报告输出路径"

prompt: |
  基于以下文件进行需求分析：

  1. 精炼需求：{{ requirement }}
  2. 项目画像：{{ profile }}
  3. 项目代码仓库：{{ project_root }}

  ## 执行规则

  1. 不要写代码。
  2. 不要修改代码文件。
  3. 分析必须基于项目代码仓库中的现有代码。如果找不到对应模块，记录为问题。

  ## 分析内容

  将分析结果写入 {{ output_analysis }}，包含以下章节：

  ### 1. 功能拆分
  将需求拆分为可独立实现的功能点，每个功能点标注：
  - 功能名称
  - 涉及模块（从代码仓库确认）
  - 关联数据表
  - 优先级 P0/P1/P2

  ### 2. 数据流
  - 数据从哪来（用户输入/外部系统/数据库）
  - 数据怎么流转
  - 数据最终存哪里

  ### 3. 界面逻辑（如果涉及前端）
  - 页面有哪些
  - 交互流程
  - 输入验证

  ### 4. 不确定项（**最关键的部分**）
  列出所有在当前信息下无法确定的问题，例如：
  - 某个字段取值规则
  - 异常情况的处理方式
  - 性能要求
  - 兼容性要求
  - 依赖的第三方服务/API
  - 某些功能点是否在现有代码中有对应实现

  每条不确定项格式：
  ```
  - [ ] 问题描述 | 建议默认方案 | 需要确认人
  ```

  ### 5. 影响范围
  - 需要修改的模块/文件列表
  - 是否有数据库变更
  - 是否有配置变更
  - 是否有接口兼容性影响

extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true
