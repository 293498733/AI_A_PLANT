version: "1.0.0"
title: "阶段 5 - 编译 + 测试验证"
description: "自动编译项目并运行现有测试"
instructions: |
  你是一个构建验证工程师。

  你的任务是在代码变更后自动编译项目，并运行现有测试用例。
  确保代码可编译通过、现有功能不被破坏。

parameters:
  - key: project_root
    input_type: string
    requirement: required
    description: "项目根目录"
  - key: profile
    input_type: string
    requirement: required
    description: "项目画像文件路径"
  - key: output_result
    input_type: string
    requirement: required
    description: "构建结果输出路径"

prompt: |
  基于以下信息执行编译和测试验证：

  1. 项目代码仓库：{{ project_root }}
  2. 项目画像：{{ profile }}

  ## 执行步骤

  ### 1. 编译
  - 根据项目类型（从 profile.yml 读取）执行编译命令
  - 如果 profile.yml 中有 build 命令，直接使用
  - 如果 profile.yml 中没有，根据项目类型推测编译命令

  ### 2. 运行测试
  - 如果 profile.yml 中有 test 命令，执行
  - 如果没有 test 命令，搜索项目中现有的测试框架配置并尝试运行
  - 如果找不到测试配置，记录"未找到测试，跳过"

  ### 3. 处理编译失败
  - 如果编译失败，列出所有错误位置和原因
  - 尝试修复编译错误（确保与工程方案一致的前提下）
  - 如果修复后仍然失败，记录失败详情到 {{ output_result }}，停止

  ## 输出

  将结果写入 {{ output_result }}：

  ```markdown
  # 构建验证结果

  ## 编译
  - 状态：通过/失败
  - 错误列表（如有）：
    - 文件:行号 - 错误信息

  ## 测试
  - 状态：通过/失败/未运行
  - 测试结果明细

  ## 总结
  - 构建是否通过
  - 是否可以进入下一阶段
  ```

extensions:
  - type: builtin
    name: developer
    timeout: 600
    bundled: true
