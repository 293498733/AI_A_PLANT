version: "1.0.0"
title: "Task - {{ task_name }}"
description: "执行单个原子开发任务。仅依赖文件上下文，不依赖对话记忆。"
instructions: |
  你正在执行一个**独立的原子开发任务**。
  你拥有完成任务所需的全部上下文（已通过参数注入）。
  不要超出任务范围。不要修改 output_files 之外的文件。
parameters:
  - key: task_name
    input_type: string
    requirement: required
    description: "任务名称"
  - key: task_description
    input_type: string
    requirement: required
    description: "任务描述"
  - key: task_context_notes
    input_type: string
    requirement: required
    description: "实现上下文说明（技术选型、约束、接口约定等）"
  - key: project_root
    input_type: string
    requirement: required
    description: "项目根目录"
  - key: profile
    input_type: string
    requirement: required
    description: "项目画像文件路径"
  - key: context_file
    input_type: string
    requirement: required
    description: "上下文文件路径（包含 input_files 和 reference_docs 内容）"
prompt: |
  ## 你的任务：{{ task_name }}

  {{ task_description }}

  ## 实现上下文

  {{ task_context_notes }}

  ## 执行规则

  1. **只修改本任务指定的文件**。不要修改任何其他文件。
  2. 读取 {{ profile }} 获取项目编码规范和受保护路径。
  3. 读取 {{ context_file }} 获取输入文件和参考文档的完整内容。
  4. 不要向用户提问。如有不确定的地方，记录下来并停止。
  5. 不要做全局重构、批量重命名、或格式化清理。
  6. 保持现有代码风格和命名习惯。

  ## 完成后

  确认所有 output_files 已正确创建/修改后，输出：
  ```
  === TASK COMPLETE ===
  Task: {{ task_name }}
  Files modified:
  - path/to/file1 (变更摘要)
  - path/to/file2 (变更摘要)
  ```
extensions:
  - type: builtin
    name: developer
    timeout: 600
    bundled: true
